<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manufacturing Board — FRC 6328 v1.84</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --gold:#EFAB28;--blue-lt:#446CE3;--blue-md:#2F4E94;--blue-dk:#162F65;
  --navy:#0d1e42;--navy-deep:#080f24;--cream:#F4F4EE;--text:#e8eaf0;
  --muted:#6b82b0;--border:rgba(47,78,148,0.6);--card-bg:#111d3e;
  --col-bg:#0c1733;--input-bg:#0d1a36;--danger:#e05252;--success:#4ade80;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Barlow',sans-serif;background:var(--navy-deep);color:var(--text);display:flex;flex-direction:column;}

/* AUTH */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:32px;background:radial-gradient(ellipse at 50% 0%,#1a3070 0%,var(--navy-deep) 65%);}
.auth-logo{display:block;width:220px;height:auto;border-radius:8px;box-shadow:0 0 60px rgba(239,171,40,0.2);}
.auth-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:28px 32px;display:flex;flex-direction:column;align-items:center;gap:16px;min-width:320px;box-shadow:0 0 0 1px rgba(239,171,40,0.08),0 24px 48px rgba(0,0,0,0.4);}
.auth-card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:.1em;text-transform:uppercase;color:var(--cream);border-top:1px solid var(--border);padding-top:16px;text-align:center;width:100%;}
.auth-card p{font-size:.8rem;color:var(--muted);text-align:center;line-height:1.5;}
.auth-error{font-size:.78rem;color:var(--danger);text-align:center;display:none;width:100%;}
.auth-divider{display:flex;align-items:center;gap:10px;width:100%;}
.auth-divider-line{flex:1;height:1px;background:rgba(107,132,184,0.2);}
.auth-divider-text{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.btn-guest{width:100%;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:9px 0;cursor:pointer;transition:all .15s;}
.btn-guest:hover{color:var(--cream);border-color:rgba(107,132,184,0.7);}

/* APP */
#app{display:none;flex-direction:column;}
header{background:var(--blue-dk);border-bottom:3px solid var(--gold);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,0.4);position:sticky;top:0;z-index:20;}
.hdr-logo{display:flex;align-items:center;}
.hdr-logo svg{height:38px;width:auto;display:block;border-radius:4px;}
.hdr-divider{width:1px;height:34px;background:var(--border);}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.15rem;color:var(--cream);letter-spacing:.1em;text-transform:uppercase;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.hdr-user{font-size:.72rem;color:var(--muted);background:var(--navy);padding:3px 10px;border-radius:99px;border:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.hdr-user-dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex-shrink:0;}
.btn-new{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;background:var(--gold);color:var(--navy-deep);border:none;border-radius:6px;padding:6px 14px;cursor:pointer;transition:all .15s;}
.btn-new:hover{background:#f8c040;transform:translateY(-1px);}
.btn-signout{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;transition:all .15s;}
.btn-signout:hover{color:var(--cream);border-color:var(--muted);}

/* VIEW TOGGLE */
.view-toggle{display:flex;background:var(--navy);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.view-toggle-btn{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:transparent;color:var(--muted);border:none;padding:5px 11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.view-toggle-btn:hover{color:var(--cream);}
.view-toggle-btn.active{background:var(--blue-md);color:var(--cream);}

/* Filter bar */
.filter-bar{background:var(--navy);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;position:sticky;top:63px;z-index:19;}
.filter-bar label{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.filter-select{font-family:'Barlow',sans-serif;font-size:.78rem;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:4px 8px;cursor:pointer;}
.filter-select:focus{outline:none;border-color:var(--gold);}
.filter-count{margin-left:auto;font-size:.72rem;color:var(--muted);}

/* ── KANBAN ────────────────────────────────────────── */
#board-kanban{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;gap:10px;padding:16px 20px;align-items:flex-start;}
#board-kanban::-webkit-scrollbar{height:5px;}
#board-kanban::-webkit-scrollbar-track{background:transparent;}
#board-kanban::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.col{flex-shrink:0;width:230px;display:flex;flex-direction:column;gap:8px;}
.col-head{display:flex;align-items:center;gap:7px;background:var(--col-bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.col-name{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--cream);flex:1;}
.col-count{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;color:var(--muted);background:var(--navy);padding:1px 6px;border-radius:99px;border:1px solid var(--border);}
.col-cards{display:flex;flex-direction:column;gap:7px;min-height:48px;border-radius:8px;padding:3px;transition:background .15s;}
.col-cards.drag-over{background:rgba(68,108,227,0.1);outline:1px dashed rgba(68,108,227,0.4);outline-offset:-3px;}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:9px;padding:10px 11px;cursor:grab;position:relative;transition:border-color .15s,box-shadow .15s,transform .1s;}
.card:hover{border-color:rgba(68,108,227,0.7);box-shadow:0 4px 14px rgba(0,0,0,0.35);}
.card.dragging{opacity:.35;cursor:grabbing;transform:rotate(1deg) scale(.97);}
.card-actions{position:absolute;top:7px;right:7px;display:none;gap:4px;}
.card:hover .card-actions{display:flex;}
.card-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--navy);color:var(--muted);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.card-btn:hover{color:var(--cream);border-color:var(--muted);}
.card-btn-del:hover{color:var(--danger);border-color:var(--danger);}
.card-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.03em;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:52px;margin-bottom:6px;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.tag{font-family:'Barlow Condensed',sans-serif;font-size:.63rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:99px;border:1px solid;}
.tag-project{background:rgba(239,171,40,.12);color:var(--gold);border-color:rgba(239,171,40,.25);}
.tag-machine{background:rgba(68,108,227,.12);color:#7fa8f5;border-color:rgba(68,108,227,.25);}
.tag-parttype{background:rgba(52,211,153,.1);color:#34d399;border-color:rgba(52,211,153,.2);}
.tag-finish{background:rgba(192,132,252,.1);color:#c084fc;border-color:rgba(192,132,252,.2);}
.card-meta{display:flex;flex-direction:column;gap:2px;}
.card-meta-row{font-size:.7rem;color:var(--muted);}
.card-meta-row strong{color:var(--text);font-weight:600;}
.card-notes{font-size:.7rem;color:var(--muted);margin-top:5px;font-style:italic;line-height:1.4;border-top:1px solid var(--border);padding-top:5px;}
.card-cad{margin-top:5px;}
.card-cad a{font-size:.68rem;color:var(--gold);text-decoration:none;}
.card-cad a:hover{text-decoration:underline;}
.col-empty{font-size:.7rem;color:var(--muted);text-align:center;padding:16px 8px;border:1px dashed rgba(47,78,148,.4);border-radius:7px;opacity:.6;}
.card-step{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.btn-step{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.25);border-radius:5px;padding:3px 9px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-step:hover{background:rgba(52,211,153,.2);border-color:rgba(52,211,153,.5);}
.btn-step:disabled{opacity:.5;cursor:not-allowed;}

/* ── LIST VIEW ─────────────────────────────────────── */
#board-list{display:none;flex-direction:column;gap:0;padding:16px 20px;}
.list-table-wrap{overflow-x:auto;}
.list-table-wrap::-webkit-scrollbar{height:4px;}
.list-table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
#board-list::-webkit-scrollbar{width:5px;}
#board-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.list-group{margin-bottom:12px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.list-group-header{display:flex;align-items:center;gap:10px;background:var(--col-bg);padding:9px 14px;cursor:pointer;user-select:none;}
.list-group-header:hover{background:#0f1e44;}
.list-group-chevron{font-size:.7rem;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.list-group-chevron.collapsed{transform:rotate(-90deg);}
.list-group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.list-group-name{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--cream);flex:1;}
.list-group-count{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;color:var(--muted);background:var(--navy);padding:1px 8px;border-radius:99px;border:1px solid var(--border);}

.list-table{width:100%;border-collapse:collapse;}
.list-table th{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:7px 14px;text-align:left;border-bottom:1px solid var(--border);background:rgba(13,26,54,0.6);white-space:nowrap;}
.list-table th.sortable{cursor:pointer;}
.list-table th.sortable:hover{color:var(--cream);}
.list-table th .sort-arrow{margin-left:4px;opacity:.4;font-size:.6rem;}
.list-table th.sort-asc .sort-arrow::after{content:'▲';opacity:1;}
.list-table th.sort-desc .sort-arrow::after{content:'▼';opacity:1;}
.list-table td{padding:8px 14px;border-bottom:1px solid rgba(47,78,148,0.25);vertical-align:middle;font-size:.8rem;color:var(--text);}
.list-table tr:last-child td{border-bottom:none;}
.list-table tr:hover td{background:rgba(68,108,227,0.06);cursor:pointer;}
.list-table tr.list-row-empty td{color:var(--muted);font-style:italic;text-align:center;padding:16px;}

.lt-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;color:var(--cream);letter-spacing:.02em;}
.lt-name-sub{font-size:.68rem;color:var(--muted);margin-top:1px;}
.lt-badge{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:99px;border:1px solid;white-space:nowrap;display:inline-block;}
.lt-badge-machine{background:rgba(68,108,227,.12);color:#7fa8f5;border-color:rgba(68,108,227,.3);}
.lt-badge-project{background:rgba(239,171,40,.1);color:var(--gold);border-color:rgba(239,171,40,.25);}
.lt-badge-finish{background:rgba(192,132,252,.1);color:#c084fc;border-color:rgba(192,132,252,.2);}
.lt-badge-parttype{background:rgba(52,211,153,.08);color:#34d399;border-color:rgba(52,211,153,.2);}
.lt-cad a{font-size:.68rem;color:var(--gold);text-decoration:none;}
.lt-cad a:hover{text-decoration:underline;}
.lt-notes{font-size:.68rem;color:var(--muted);font-style:italic;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lt-mat{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.lt-mat-name{font-size:.78rem;color:var(--text);}
.lt-mat-thick{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;color:var(--muted);background:var(--navy);padding:1px 6px;border-radius:4px;border:1px solid var(--border);}
.lt-date{font-size:.72rem;color:var(--muted);white-space:nowrap;}
.lt-qty{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;color:var(--text);}
.lt-assignee{font-size:.75rem;color:var(--muted);}
.lt-actions{display:flex;gap:4px;opacity:0;transition:opacity .1s;}
tr:hover .lt-actions{opacity:1;}
.lt-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--navy);color:var(--muted);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;padding:0;}
.lt-btn:hover{color:var(--cream);border-color:var(--muted);}
.lt-btn-del:hover{color:var(--danger);border-color:var(--danger);}
.lt-step-btn{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:rgba(52,211,153,.08);color:#34d399;border:1px solid rgba(52,211,153,.2);border-radius:4px;padding:2px 7px;cursor:pointer;white-space:nowrap;}
.lt-step-btn:hover{background:rgba(52,211,153,.18);}
.lt-step-btn:disabled{opacity:.4;cursor:not-allowed;}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--blue-dk);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border);}
.modal h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field.full{grid-column:1/-1;}
.field label{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.field input,.field select,.field textarea{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.84rem;padding:7px 9px;outline:none;transition:border-color .15s;width:100%;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue-lt);}
.field select option{background:var(--blue-dk);}
.field textarea{resize:vertical;min-height:56px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:4px;}
.btn-cancel{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:7px 16px;cursor:pointer;transition:all .15s;}
.btn-cancel:hover{color:var(--cream);border-color:var(--muted);}
.btn-save{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--gold);color:var(--navy-deep);border:none;border-radius:6px;padding:7px 20px;cursor:pointer;transition:opacity .15s;}
.btn-save:hover{opacity:.85;}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}
.btn-delete{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--danger);border:1px solid rgba(224,82,82,.3);border-radius:6px;padding:7px 14px;cursor:pointer;transition:all .15s;margin-right:auto;}
.btn-delete:hover{background:rgba(224,82,82,.1);}

#loading{position:fixed;inset:0;background:rgba(8,15,36,.8);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:90;}
#loading.show{display:flex;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--blue-dk);color:var(--cream);font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.06em;padding:10px 20px;border-radius:99px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;white-space:nowrap;}
#toast.show{opacity:1;}
#toast.error{border-color:var(--danger);color:var(--danger);}
</style>
</head>

<!-- CARD MODAL -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <h2 id="modal-title">New Manufacturing Card</h2>
    <div class="modal-grid">
      <div class="field full"><label>Part Name *</label><input type="text" id="f-name" placeholder="e.g. Elevator Bracket"/></div>
      <div class="field"><label>Status</label><select id="f-status"></select></div>
      <div class="field"><label>Project</label>
        <select id="f-project"><option value="">—</option><option>Comp Bot</option><option>Dev Bot</option><option>Prototype</option><option>Spare</option><option>Off-Season</option><option>Kitbot</option></select>
      </div>
      <div class="field"><label>Machine</label>
        <select id="f-machine"><option value="">—</option><option>CNC Mill</option><option>CNC Router</option><option>Lathe</option><option>Mill</option><option>3D Printer</option><option>Chop Saw</option><option>Laser Cutter</option></select>
      </div>
      <div class="field"><label>Part Type</label>
        <select id="f-parttype"><option value="">—</option><option>Plate</option><option>Hex Shaft</option><option>Round Shaft</option><option>Tube 1x1in</option><option>Tube 1x2in</option><option>Tube 2x2in</option><option>Billet</option><option>Other</option></select>
      </div>

        <select id="f-material"><option value="">—</option><option>Aluminum</option><option>Steel</option><option>SRPP</option><option>Polycarbonate</option><option>PLA+</option><option>Nylon CF</option><option>Nylon GF</option></select>
      </div>
      <div class="field"><label>Thickness</label>
        <select id="f-thickness"><option value="">—</option><option>1/16"</option><option>0.09"</option><option>1/8"</option><option>3/16"</option><option>1/4"</option><option>3/8"</option><option>1/2"</option><option>3/4"</option><option>1"</option></select>
      </div>
      <div class="field"><label>Finish</label>
        <select id="f-finish"><option value="">None</option><option>Powder Coat — Blue</option><option>Powder Coat — Black</option><option>Powder Coat — Yellow</option><option>Anodize</option></select>
      </div>
      <div class="field"><label>Quantity</label><input type="number" id="f-qty" min="1" placeholder="1"/></div>
      <div class="field full"><label>Assigned To</label><input type="text" id="f-assigned" placeholder="Student name"/></div>
      <div class="field full"><label>CAD Link</label><input type="url" id="f-cadlink" placeholder="https://cad.onshape.com/..."/></div>
      <div class="field full"><label>Notes</label><textarea id="f-notes" placeholder="Special instructions, tolerances, etc."></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete" onclick="deleteCurrentCard()" style="display:none">Delete Card</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>

    </div>
  </div>
</div>

<div id="loading"><div class="spinner"></div></div>
<div id="toast"></div>

<script>
const ALLOWED_DOMAIN = 'littletonrobotics.org';
const BOARD_API = '/api/board';

const STATUSES = [
  { id:'Needs Drawing',                color:'#a78bfa' },
  { id:'Needs CAM',                    color:'#60a5fa' },
  { id:'Needs Slicing',                color:'#34d399' },
  { id:'In Progress',                  color:'#fbbf24' },
  { id:'Ready for Saw',                color:'#f97316' },
  { id:'Ready for Lathe',              color:'#e879f9' },
  { id:'Ready for Mill',               color:'#818cf8' },
  { id:'Ready for CNC Mill',           color:'#22d3ee' },
  { id:'Ready for CNC Router',         color:'#4ade80' },
  { id:'Ready for 3D Printer',         color:'#fb923c' },
  { id:'Ready for Laser Cutter',       color:'#f43f5e' },
  { id:'Done Fab Need to Powder Coat', color:'#c084fc' },
  { id:'Done',                         color:'#86efac' },
];

let allCards = [], editingId = null, userEmail = null, dragCardId = null;
let currentView = 'kanban'; // 'kanban' | 'list'
let collapsedGroups = new Set(); // which status groups are collapsed in list view

// ── VIEW TOGGLE ──────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('btn-view-kanban').classList.toggle('active', v === 'kanban');
  document.getElementById('btn-view-list').classList.toggle('active', v === 'list');
  document.getElementById('board-kanban').style.display = v === 'kanban' ? 'flex' : 'none';
  document.getElementById('board-list').style.display   = v === 'list'   ? 'flex' : 'none';

  const app = document.getElementById('app');
  if (v === 'list') {
    document.documentElement.style.height = 'auto';
    document.documentElement.style.overflow = 'auto';
    document.body.style.height = 'auto';
    document.body.style.overflow = 'auto';
    app.style.height = 'auto';
    app.style.overflow = 'visible';
  } else {
    document.documentElement.style.height = '100%';
    document.documentElement.style.overflow = 'hidden';
    document.body.style.height = '100%';
    document.body.style.overflow = 'hidden';
    app.style.height = '100vh';
    app.style.overflow = 'hidden';
  }
  renderCurrentView();
}

function renderCurrentView() {
  if (currentView === 'kanban') buildBoard();
  else buildListView();
}

// ── AUTH ────────────────────────────────────────────────────
function handleGoogleSignIn(response) {
  const p = parseJwt(response.credential);
  if (!p.email.endsWith('@' + ALLOWED_DOMAIN)) {
    const err = document.getElementById('auth-error');
    err.textContent = 'Access restricted to @' + ALLOWED_DOMAIN + ' accounts.';
    err.style.display = 'block'; return;
  }
  userEmail = p.email;
  document.getElementById('hdr-user').textContent = p.name || p.email;
  showApp();
}
function continueAsGuest() {
  userEmail = 'guest';
  document.getElementById('hdr-user').textContent = 'Guest';
  showApp();
}
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  app.style.height = '100vh';
  app.style.overflow = 'hidden';
  // Ensure correct initial display state
  document.getElementById('board-kanban').style.display = 'flex';
  document.getElementById('board-list').style.display = 'none';
  loadCards();
}
function signOut() {
  try { google.accounts.id.disableAutoSelect(); } catch(_) {}
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  userEmail = null; allCards = [];
}
function parseJwt(t) { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }

window.addEventListener('DOMContentLoaded', () => {
  const clientId = document.getElementById('g_id_onload')?.dataset?.client_id || '';
  if (!clientId || clientId === 'YOUR_GOOGLE_CLIENT_ID_HERE') continueAsGuest();
});

// ── API ─────────────────────────────────────────────────────
async function apiGet() {
  const r = await fetch(BOARD_API);
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || 'API error');
  return d;
}
async function apiPost(body) {
  const r = await fetch(BOARD_API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || 'API error');
  return d;
}

// ── LOAD ────────────────────────────────────────────────────
async function loadCards() {
  showLoading(true);
  try {
    const d = await apiGet();
    allCards = d.cards || [];
    renderCurrentView();
    populateAssigneeFilter();
  } catch(e) { toast('Failed to load: ' + e.message, 'error'); }
  finally { showLoading(false); }
}

// ── FILTER HELPER ────────────────────────────────────────────
function getFiltered() {
  const fp = document.getElementById('filter-project').value;
  const fm = document.getElementById('filter-machine').value;
  const fa = document.getElementById('filter-assigned').value;
  const filtered = allCards.filter(c =>
    (!fp || c.project === fp) && (!fm || c.machine === fm) && (!fa || c.assigned_to === fa));
  document.getElementById('filter-count').textContent =
    `${filtered.length} of ${allCards.length} card${allCards.length!==1?'s':''}`;
  return filtered;
}

// ── KANBAN ───────────────────────────────────────────────────
function buildBoard() {
  const filtered = getFiltered();
  const board = document.getElementById('board-kanban');
  board.innerHTML = '';
  STATUSES.forEach(s => {
    const cards = filtered.filter(c => c.status === s.id);
    const col = document.createElement('div');
    col.className = 'col'; col.dataset.status = s.id;
    col.innerHTML = `
      <div class="col-head">
        <div class="col-dot" style="background:${s.color}"></div>
        <span class="col-name">${s.id}</span>
        <span class="col-count">${cards.length}</span>
      </div>
      <div class="col-cards" data-status="${s.id}">
        ${cards.length===0?'<div class="col-empty">No cards</div>':''}
      </div>`;
    board.appendChild(col);
    const zone = col.querySelector('.col-cards');
    cards.forEach(c => zone.appendChild(makeCardEl(c)));
    setupDropZone(zone);
  });
}

function makeCardEl(card) {
  const el = document.createElement('div');
  el.className = 'card'; el.dataset.id = card.id; el.draggable = true;
  el.addEventListener('dragstart', e => {
    dragCardId = card.id;
    setTimeout(() => el.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.col-cards').forEach(z => z.classList.remove('drag-over'));
  });
  const tags = [];
  if (card.project)  tags.push(`<span class="tag tag-project">${card.project}</span>`);
  if (card.machine)  tags.push(`<span class="tag tag-machine">${card.machine}</span>`);
  if (card.part_type) tags.push(`<span class="tag tag-parttype">${card.part_type}</span>`);
  if (card.finish && card.finish !== 'None' && card.finish !== '')
    tags.push(`<span class="tag tag-finish">${card.finish.replace('Powder Coat — ','PC ')}</span>`);
  const meta = [];
  const mat = [card.material, fmtThickness(card.thickness)].filter(Boolean).join(' · ');
  if (mat) meta.push(`<div class="card-meta-row"><strong>${mat}</strong></div>`);
  if (card.quantity) meta.push(`<div class="card-meta-row">Qty: <strong>${card.quantity}</strong></div>`);
  if (card.assigned_to) meta.push(`<div class="card-meta-row">→ <strong>${card.assigned_to}</strong></div>`);
  el.innerHTML = `
    <div class="card-actions">
      <button class="card-btn card-btn-edit" onclick="openEditModal('${card.id}')" title="Edit">✎</button>
      <button class="card-btn card-btn-del" onclick="confirmDelete('${card.id}')" title="Delete">✕</button>
    </div>
    <div class="card-name" title="${esc(card.name)}">${esc(card.name)}</div>
    ${tags.length?`<div class="card-tags">${tags.join('')}</div>`:''}
    ${meta.length?`<div class="card-meta">${meta.join('')}</div>`:''}
    ${card.notes?`<div class="card-notes">${esc(card.notes.slice(0,80))}${card.notes.length>80?'…':''}</div>`:''}
    ${card.cad_link?`<div class="card-cad"><a href="${esc(card.cad_link)}" target="_blank">↗ Open in OnShape</a></div>`:''}
    ${card.step_file_id?`<div class="card-step"><button class="btn-step" onclick="downloadStep(event,'${card.id}','${esc(card.step_file_name||card.step_file_id)}')">⬇ STEP</button></div>`:''}`;
  return el;
}

// ── LIST VIEW ────────────────────────────────────────────────
function buildListView() {
  const filtered = getFiltered();
  const container = document.getElementById('board-list');
  container.innerHTML = '';

  STATUSES.forEach(s => {
    const cards = filtered.filter(c => c.status === s.id);
    const isCollapsed = collapsedGroups.has(s.id);

    const group = document.createElement('div');
    group.className = 'list-group';

    const header = document.createElement('div');
    header.className = 'list-group-header';
    header.innerHTML = `
      <span class="list-group-chevron${isCollapsed?' collapsed':''}">▾</span>
      <div class="list-group-dot" style="background:${s.color}"></div>
      <span class="list-group-name">${s.id}</span>
      <span class="list-group-count">${cards.length}</span>`;
    header.addEventListener('click', () => toggleGroup(s.id, group));
    group.appendChild(header);

    const tableWrap = document.createElement('div');
    tableWrap.className = 'list-table-wrap';
    tableWrap.style.display = isCollapsed ? 'none' : 'block';

    const table = document.createElement('table');
    table.className = 'list-table';
    table.innerHTML = `
      <thead>
        <tr>
          <th style="min-width:200px">Part Name</th>
          <th style="min-width:90px">Project</th>
          <th style="min-width:105px">Machine</th>
          <th style="min-width:90px">Part Type</th>
          <th style="min-width:130px">Material</th>
          <th style="min-width:70px">Thickness</th>
          <th style="min-width:110px">Finish</th>
          <th style="min-width:45px">Qty</th>
          <th style="min-width:110px">Assignee</th>
          <th style="min-width:160px">Notes</th>
          <th style="min-width:80px">CAD</th>
          <th style="min-width:80px">File</th>
          <th style="min-width:80px">Submitted</th>
          <th style="min-width:60px"></th>
        </tr>
      </thead>
      <tbody></tbody>`;
    const tbody = table.querySelector('tbody');
    const COLS = 14;

    if (cards.length === 0) {
      tbody.innerHTML = `<tr class="list-row-empty"><td colspan="${COLS}">No cards</td></tr>`;
    } else {
      cards.forEach(card => {
        const tr = document.createElement('tr');
        tr.addEventListener('click', (e) => {
          if (e.target.closest('button')) return;
          openEditModal(card.id);
        });

        // Material
        const matParts = [];
        if (card.material) matParts.push(`<span class="lt-mat-name">${esc(card.material)}</span>`);
        const matHtml = matParts.length ? matParts[0] : '<span style="color:var(--muted)">—</span>';

        const badge = (val, cls) => val
          ? `<span class="lt-badge ${cls}">${esc(val)}</span>`
          : '<span style="color:var(--muted)">—</span>';

        const finishDisplay = card.finish && card.finish !== 'None' && card.finish !== ''
          ? card.finish.replace('Powder Coat — ', 'PC ') : null;

        const stepHtml = card.step_file_id
          ? `<button class="lt-step-btn" onclick="downloadStep(event,'${card.id}','${esc(card.step_file_name||card.step_file_id)}')">⬇ STEP</button>`
          : '<span style="color:var(--muted)">—</span>';

        const cadHtml = card.cad_link
          ? `<div class="lt-cad"><a href="${esc(card.cad_link)}" target="_blank" onclick="event.stopPropagation()">↗ CAD</a></div>`
          : '<span style="color:var(--muted)">—</span>';

        tr.innerHTML = `
          <td><div class="lt-name">${esc(card.name)}</div></td>
          <td>${badge(card.project, 'lt-badge-project')}</td>
          <td>${badge(card.machine, 'lt-badge-machine')}</td>
          <td>${badge(card.part_type, 'lt-badge-parttype')}</td>
          <td>${matHtml}</td>
          <td>${fmtThickness(card.thickness) ? `<span class="lt-mat-thick">${esc(fmtThickness(card.thickness))}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
          <td>${finishDisplay ? `<span class="lt-badge lt-badge-finish">${esc(finishDisplay)}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
          <td><span class="lt-qty">${card.quantity || '—'}</span></td>
          <td><span class="lt-assignee">${card.assigned_to ? esc(card.assigned_to) : '—'}</span></td>
          <td>${card.notes ? `<span class="lt-notes" title="${esc(card.notes)}">${esc(card.notes)}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
          <td>${cadHtml}</td>
          <td>${stepHtml}</td>
          <td>${card.created_at ? `<span class="lt-date">${timeAgo(card.created_at)}</span>` : '—'}</td>
          <td>
            <div class="lt-actions">
              <button class="lt-btn" onclick="openEditModal('${card.id}')" title="Edit">✎</button>
              <button class="lt-btn lt-btn-del" onclick="confirmDelete('${card.id}')" title="Delete">✕</button>
            </div>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    tableWrap.appendChild(table);
    group.appendChild(tableWrap);
    container.appendChild(group);
  });
}

function toggleGroup(statusId, groupEl) {
  const isNowCollapsed = !collapsedGroups.has(statusId);
  if (isNowCollapsed) collapsedGroups.add(statusId);
  else collapsedGroups.delete(statusId);
  const chevron = groupEl.querySelector('.list-group-chevron');
  const tableWrap = groupEl.querySelector('.list-table-wrap');
  chevron.classList.toggle('collapsed', isNowCollapsed);
  tableWrap.style.display = isNowCollapsed ? 'none' : 'block';
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return '1 day ago';
  if (days < 30) return `${days} days ago`;
  const weeks = Math.floor(days / 7);
  if (weeks < 8) return `${weeks}w ago`;
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function populateAssigneeFilter() {
  const sel = document.getElementById('filter-assigned'), cur = sel.value;
  const names = [...new Set(allCards.map(c=>c.assigned_to).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All Assignees</option>' +
    names.map(n=>`<option${n===cur?' selected':''}>${esc(n)}</option>`).join('');
}

// ── DRAG & DROP ─────────────────────────────────────────────
function setupDropZone(zone) {
  zone.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', async e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    if (!dragCardId) return;
    const newStatus = zone.dataset.status;
    const card = allCards.find(c=>c.id===dragCardId);
    if (!card || card.status===newStatus) return;
    card.status = newStatus; buildBoard();
    try { await apiPost({ action:'moveCard', id:dragCardId, status:newStatus }); }
    catch(e) { toast('Move failed: '+e.message,'error'); loadCards(); }
  });
}

// ── MODAL ───────────────────────────────────────────────────
function populateStatusSelect(cur) {
  document.getElementById('f-status').innerHTML =
    STATUSES.map(s=>`<option${s.id===cur?' selected':''}>${s.id}</option>`).join('');
}
function openNewCardModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'New Manufacturing Card';
  document.getElementById('btn-save').textContent = 'Create Card';
  document.getElementById('btn-delete').style.display = 'none';
  ['f-name','f-project','f-machine','f-parttype','f-material','f-thickness','f-finish','f-qty','f-assigned','f-cadlink','f-notes']
    .forEach(id => document.getElementById(id).value = '');
  populateStatusSelect('Needs Drawing');
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-name').focus();
}
function openEditModal(id) {
  const c = allCards.find(x=>x.id===id); if(!c) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Card';
  document.getElementById('btn-save').textContent = 'Save Changes';
  document.getElementById('btn-delete').style.display = 'block';
  populateStatusSelect(c.status);
  document.getElementById('f-name').value      = c.name        || '';
  document.getElementById('f-project').value   = c.project     || '';
  document.getElementById('f-machine').value   = c.machine     || '';
  document.getElementById('f-parttype').value  = c.part_type   || '';
  document.getElementById('f-material').value  = c.material    || '';
  document.getElementById('f-thickness').value = c.thickness   || '';
  document.getElementById('f-finish').value    = c.finish      || '';
  document.getElementById('f-qty').value       = c.quantity    || '';
  document.getElementById('f-assigned').value  = c.assigned_to || '';
  document.getElementById('f-cadlink').value   = c.cad_link    || '';
  document.getElementById('f-notes').value     = c.notes       || '';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function handleBackdropClick(e) { if(e.target===e.currentTarget) closeModal(); }

async function saveCard() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Part name is required','error'); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Saving...';
  const updates = {
    name, status:document.getElementById('f-status').value,
    project:document.getElementById('f-project').value,
    machine:document.getElementById('f-machine').value,
    partType:document.getElementById('f-parttype').value,
    material:document.getElementById('f-material').value,
    thickness:document.getElementById('f-thickness').value,
    finish:document.getElementById('f-finish').value,
    quantity:document.getElementById('f-qty').value,
    assigned:document.getElementById('f-assigned').value,
    cadLink:document.getElementById('f-cadlink').value,
    notes:document.getElementById('f-notes').value,
  };
  try {
    if (editingId) {
      await apiPost({ action:'updateCard', id:editingId, updates });
      const idx = allCards.findIndex(c=>c.id===editingId);
      if (idx>=0) allCards[idx] = { ...allCards[idx],
        name:updates.name, status:updates.status, project:updates.project,
        machine:updates.machine, part_type:updates.partType, material:updates.material,
        thickness:updates.thickness, finish:updates.finish, quantity:updates.quantity,
        assigned_to:updates.assigned, cad_link:updates.cadLink, notes:updates.notes };
      toast('Card updated');
    } else {
      const res = await apiPost({ action:'createCard', card:{ ...updates, submittedBy:userEmail } });
      allCards.unshift(res.card);
      toast('Card created');
    }
    closeModal(); renderCurrentView(); populateAssigneeFilter();
  } catch(e) { toast('Error: '+e.message,'error'); }
  finally { btn.disabled=false; btn.textContent=editingId?'Save Changes':'Create Card'; }
}
function deleteCurrentCard() { if(editingId) confirmDelete(editingId, true); }
async function confirmDelete(id, fromModal=false) {
  if (!confirm('Delete this card? Cannot be undone.')) return;
  if (fromModal) closeModal();
  allCards = allCards.filter(c=>c.id!==id); renderCurrentView();
  try { await apiPost({ action:'deleteCard', id }); toast('Card deleted'); }
  catch(e) { toast('Delete failed: '+e.message,'error'); loadCards(); }
}

// ── STEP DOWNLOAD ───────────────────────────────────────────
async function downloadStep(e, cardId, filename) {
  const btn = e.target;
  btn.disabled = true; btn.textContent = '⏳';
  try {
    const card = allCards.find(c => c.id === cardId);
    if (!card?.step_file_id) throw new Error('No STEP file on this card');
    const res = await apiPost({ action: 'getStepUrl', path: card.step_file_id });
    const a = document.createElement('a');
    a.href = res.url; a.download = filename || 'part.step'; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Downloading ' + (filename || 'part.step'));
  } catch(err) { toast('Download failed: ' + err.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '⬇ STEP'; }
}

// ── UTILS ───────────────────────────────────────────────────
// Normalize thickness display: "1/2 in" (OnShape) → "1/2"" (board standard)
function fmtThickness(t) {
  if (!t) return null;
  return t.replace(/\s*in$/i, '"');
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showLoading(on) { document.getElementById('loading').classList.toggle('show',on); }
let toastTimer;
function toast(msg, type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=type==='error'?'error show':'show';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className=type==='error'?'error':'',3000);
}
</script>
